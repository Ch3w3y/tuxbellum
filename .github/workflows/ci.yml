name: CI/CD

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]
  schedule:
    # Weekly dependency check every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'
  APPIMAGE_EXTRACT_AND_RUN: 1

jobs:
  # ── Lint ──────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2-dev \
            libgirepository-2.0-dev \
            pkg-config \
            python3-dev \
            gir1.2-gtk-4.0 \
            libgtk-4-dev \
            libfuse2

      - name: Install dependencies
        run: pip install ruff black mypy PyGObject

      - name: Ruff check
        run: ruff check src/

      - name: Black check
        run: black --check src/

      - name: MyPy (non-GTK modules only)
        run: |
          mypy src/tuxbellum/config/ src/tuxbellum/core/ src/tuxbellum/installer/ \
            --ignore-missing-imports --no-error-summary || true

      - name: Version consistency check
        run: python scripts/check_versions.py

  # ── Test ─────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2-dev \
            libgirepository-2.0-dev \
            pkg-config \
            python3-dev \
            gir1.2-gtk-4.0 \
            libgtk-4-dev \
            libfuse2

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            -m "not gtk4" \
            --cov=tuxbellum \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=20

      - name: Check PKGBUILD dependencies
        run: python scripts/check_aur_deps.py

  # ── Version & Packaging Check ───────────────────────
  verify-packaging:
    name: Verify Packaging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify release tarball contents
        run: |
          echo "Checking required directories exist in source..."
          for dir in src packages locales data docs scripts; do
            if [ ! -d "$dir" ]; then
              echo "ERROR: Missing directory: $dir"
              exit 1
            fi
            echo "  OK: $dir/"
          done
          echo ""
          echo "Checking required files exist..."
          for f in meson.build pyproject.toml PKGBUILD LICENSE README.md Makefile; do
            if [ ! -f "$f" ]; then
              echo "ERROR: Missing file: $f"
              exit 1
            fi
            echo "  OK: $f"
          done
          echo ""
          echo "Checking packages/ has expected assets..."
          if ! ls packages/dxvk-*.tar.gz >/dev/null 2>&1; then
            echo "ERROR: DXVK tarball missing from packages/"
            exit 1
          fi
          echo "  OK: DXVK tarball present"
          if ! ls packages/winetricks-*.tar.gz >/dev/null 2>&1; then
            echo "ERROR: Winetricks tarball missing from packages/"
            exit 1
          fi
          echo "  OK: Winetricks tarball present"
          if [ ! -d "packages/fsr4" ]; then
            echo "ERROR: FSR4 directory missing from packages/"
            exit 1
          fi
          echo "  OK: packages/fsr4/"
          if [ ! -f "data/icons/bellum.png" ]; then
            echo "ERROR: Application icon missing"
            exit 1
          fi
          echo "  OK: bellum.png"
          echo ""
          echo "All packaging checks passed."

  # ── Dependency Check ─────────────────────────────────
  dependency-check:
    name: Check Dependency Updates
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Check for new releases
        id: check
        run: |
          python scripts/check_dependencies.py || echo "No updates found"
          if [ -f "dependency_updates.txt" ]; then
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR for updates
        if: steps.check.outputs.has_updates == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          title: 'chore: update dependency versions'
          body: |
            Automated dependency version update detected.

            See `dependency_updates.txt` for details.
          branch: dependency-updates
          commit-message: 'chore: update dependency versions'

  # ── Build Release ────────────────────────────────────
  release:
    name: Build & Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, test, verify-packaging]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build dependencies
        run: |
          pip install build meson-python setuptools
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2-dev \
            libgirepository-2.0-dev \
            pkg-config \
            python3-dev \
            gir1.2-gtk-4.0 \
            libgtk-4-dev \
            libfuse2

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build release tarball
        run: make release VERSION=${{ steps.version.outputs.VERSION }}

      - name: Build AppImage
        run: bash scripts/build-appimage.sh ${{ steps.version.outputs.VERSION }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tuxbellum-${{ steps.version.outputs.VERSION }}.tar.gz
            TuxBellum-${{ steps.version.outputs.VERSION }}-x86_64.AppImage
          generate_release_notes: true

  # ── AUR Update ──────────────────────────────────────
  aur-update:
    name: Update AUR Package
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update PKGBUILD checksums
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          # Use the release asset tarball (same file the PKGBUILD source points to)
          TARBALL_URL="https://github.com/Ch3w3y/tuxbellum/releases/download/v${VERSION}/tuxbellum-${VERSION}.tar.gz"
          SHA256=$(curl -sL "$TARBALL_URL" | sha256sum | cut -d' ' -f1)
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('${SHA256}')/" PKGBUILD
          updpkgsums 2>/dev/null || true

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        with:
          pkgname: tuxbellum
          pkgbuild: ./PKGBUILD
          commit_username: Ch3w3y
          commit_email: ch3w3y@users.noreply.github.com
          ssh_private_key: ${{ secrets.AUR_SSH_KEY }}
          commit_message: "Update to ${{ github.ref_name }}"
          allow_empty_commits: false
